plugins {
    id 'base'
}

allprojects {
    group = 'com.langgraphtrials'
    version = '0.1.0'
}

tasks.register('run', Exec) {
    group = 'application'
    description = 'Run both frontend and backend modules together.'
    workingDir = rootProject.projectDir
    commandLine '/bin/zsh', '-lc', './gradlew :backend:run & ./gradlew :frontend:run & wait'
}
